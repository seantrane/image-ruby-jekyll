---
name: Deployment

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ${{ fromJson(vars.GH_RUNNER || '["ubuntu-latest"]') }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        # https://github.com/actions/checkout/releases/tag/v6.0.3
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Parse versions from release tag
        id: versions
        run: |
          TAG="${{ github.ref_name }}"
          RUBY_VERSION=$(echo "$TAG" | sed 's/ruby-\([^-]*\)_.*/\1/')
          JEKYLL_VERSION=$(echo "$TAG" | sed 's/.*jekyll-//')

          echo "ruby=$RUBY_VERSION" >> "$GITHUB_OUTPUT"
          echo "jekyll=$JEKYLL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        # https://github.com/docker/login-action/releases/tag/v4.2.0
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN || secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        # https://github.com/docker/setup-qemu-action/releases/tag/v4.1.0
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        # https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build and push
        # https://github.com/docker/build-push-action/releases/tag/v7.2.0
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Enable if need to override build-arguments defaults
          # build-args: |
          #   RUBY_VERSION=${{ steps.versions.outputs.ruby }}
          #   JEKYLL_VERSION=${{ steps.versions.outputs.jekyll }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
